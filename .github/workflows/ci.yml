name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy-and-test:
    name: clippy + test (MLIR 22)
    runs-on: ubuntu-24.04
    # Runs inside the CI image built from .github/docker/Dockerfile.ci
    # (see ADR 0132). MLIR 22 + Rust toolchain + env vars are baked in;
    # this job just checks out the source, restores cargo cache, and
    # runs the gate.
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/shortarrow/lumelir-ci:mlir-22
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --no-fail-fast
