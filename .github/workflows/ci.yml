name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  fmt:
    name: cargo fmt --check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy-and-test:
    name: clippy + test (MLIR 22)
    runs-on: ubuntu-24.04
    # Runs inside the CI image built from .github/docker/Dockerfile.ci
    # (see ADR 0132). MLIR 22 + Rust toolchain + env vars are baked in;
    # this job just checks out the source, restores cargo cache, and
    # runs the gate.
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/shortarrow/lumelir-ci:mlir-22
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --no-fail-fast

  clippy-and-test-arm64:
    # ADR 0308 — N9: native arm64 lane on the free public-repo arm
    # runner. Exercises the full llc→cc pipeline on aarch64 (llc
    # targets the host triple, so every e2e test compiles + runs a
    # native arm64 binary). Hard gate since the ADR 0310 fix + the
    # RUST_MIN_STACK bump turned the lane green (N9-B closed).
    name: clippy + test (MLIR 22, arm64)
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/shortarrow/lumelir-ci:mlir-22-arm64
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      # AArch64 frames spill more than x86-64 in the recursive
      # parser/HIR paths; the 2 MiB test-thread default overflows
      # on phase2_6c_tag_hash_hard (ADR 0308 bake log).
      RUST_MIN_STACK: "8388608"
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --no-fail-fast

  clippy-and-test-darwin:
    # ADR 0311 — N9-C: arm64-darwin lane on Apple Silicon macos-15
    # runners. No container support on macOS runners, so MLIR comes
    # from the Homebrew llvm bottle (melior's documented macOS path);
    # the version guard fails fast if the formula drifts off 22.x.
    # Soft lane (continue-on-error) until the bake is green.
    name: clippy + test (MLIR 22, arm64-darwin)
    runs-on: macos-15
    continue-on-error: true
    env:
      # Same AArch64 frame-spill headroom as the linux arm64 lane
      # (ADR 0308 bake log).
      RUST_MIN_STACK: "8388608"
      # Static MLIR/LLVM makes every integration-test binary carry the
      # full toolchain and exhausts the runner disk (ld errno=28,
      # ADR 0311 bake log round 2) — link the Homebrew dylibs instead.
      MLIR_SYS_LINK_SHARED: "1"
      # Match rustc's -mmacosx-version-min to the Homebrew bottle's
      # build target; silences per-object version-mismatch warnings.
      MACOSX_DEPLOYMENT_TARGET: "15.0"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install LLVM/MLIR 22 via Homebrew
        run: |
          uname -m
          if brew info llvm@22 >/dev/null 2>&1; then FORMULA=llvm@22; else FORMULA=llvm; fi
          brew install "$FORMULA"
          PREFIX="$(brew --prefix "$FORMULA")"
          "$PREFIX/bin/llvm-config" --version
          "$PREFIX/bin/llvm-config" --version | grep -q '^22\.' \
            || { echo "::error::Homebrew $FORMULA is LLVM $("$PREFIX/bin/llvm-config" --version), need 22.x (ADR 0311)"; exit 1; }
          ls "$PREFIX/lib" | grep -iE 'libMLIR(-C)?\.' || true
          "$PREFIX/bin/llvm-config" --shared-mode || true
          df -h /
          if [ ! -e "$PREFIX/lib/libMLIR-C.dylib" ]; then
            ls "$PREFIX"/lib/libMLIRCAPI*.a >/dev/null 2>&1 \
              || { echo "::error::no libMLIRCAPI*.a in the bottle — cannot build libMLIR-C.dylib (ADR 0311)"; exit 1; }
            FORCE_LOAD=""
            for a in "$PREFIX"/lib/libMLIRCAPI*.a; do FORCE_LOAD="$FORCE_LOAD -Wl,-force_load,$a"; done
            # shellcheck disable=SC2086
            clang++ -dynamiclib -o "$PREFIX/lib/libMLIR-C.dylib" \
              -Wl,-install_name,"$PREFIX/lib/libMLIR-C.dylib" \
              $FORCE_LOAD \
              -L"$PREFIX/lib" -lMLIR $("$PREFIX/bin/llvm-config" --libs --link-shared)
            nm -gU "$PREFIX/lib/libMLIR-C.dylib" | grep -q mlirContextCreate \
              || { echo "::error::built libMLIR-C.dylib but C API symbols missing (ADR 0311)"; exit 1; }
            echo "built libMLIR-C.dylib from the bottle's libMLIRCAPI*.a archives"
          fi
          {
            echo "MLIR_SYS_220_PREFIX=$PREFIX"
            echo "LLVM_SYS_220_PREFIX=$PREFIX"
            echo "TABLEGEN_220_PREFIX=$PREFIX"
          } >> "$GITHUB_ENV"
          echo "$PREFIX/bin" >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --no-fail-fast

  audit:
    name: cargo audit (security advisories)
    runs-on: ubuntu-24.04
    # ADR 0251 — Phase 5 production hardening: continuously
    # check Cargo.lock against the RustSec advisory database.
    # `--deny warnings` so any unmaintained / yanked / vulnerable
    # dependency surfaces as a CI failure.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked
      - run: cargo audit --deny warnings
