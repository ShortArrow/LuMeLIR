name: Build CI image

# Builds and pushes the CI images used by the clippy-and-test jobs
# in ci.yml. See ADR 0132 (amd64 / Arch + AUR mlir) and ADR 0308
# (arm64 / Ubuntu + apt.llvm.org — N9 multi-target lane).
#
# Path-filtered: only triggers when a Dockerfile or this workflow
# itself changes, so normal source pushes do NOT pay the ~1-2h
# first-run MLIR compile cost.

on:
  push:
    branches: [main]
    paths:
      - '.github/docker/Dockerfile.ci'
      - '.github/docker/Dockerfile.ci-arm64'
      - '.github/workflows/build-ci-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-amd64:
    name: Build & push amd64 image (Arch + AUR mlir)
    runs-on: ubuntu-24.04
    timeout-minutes: 180  # AUR mlir = MLIR 22 source compile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/docker/Dockerfile.ci
          push: true
          tags: |
            ghcr.io/shortarrow/lumelir-ci:mlir-22
            ghcr.io/shortarrow/lumelir-ci:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-arm64:
    # ADR 0308 — N9: native arm64 build (no qemu) on the free
    # public-repo arm runner. Ubuntu + apt.llvm.org packages, so
    # this is minutes, not the AUR source-compile hours.
    name: Build & push arm64 image (Ubuntu + apt.llvm.org)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/docker/Dockerfile.ci-arm64
          push: true
          tags: |
            ghcr.io/shortarrow/lumelir-ci:mlir-22-arm64
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64
